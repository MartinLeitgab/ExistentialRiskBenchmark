# pytest.ini - Configuration
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -m "not integration"
markers =
    integration: tests that call real external APIs
    batch: marks tests that run full batch pipelines
    slow: long-running tests