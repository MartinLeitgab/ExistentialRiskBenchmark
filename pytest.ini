# pytest.ini - Configuration
[pytest]
pythonpath = .
testpaths = tests pipeline_a_scenarios/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
markers =
    unit: Unit tests
    integration: Integration tests and tests that call real external APIs
    batch: marks tests that run full batch pipelines
    slow: long-running tests
    requires_api: Tests that require actual API access
